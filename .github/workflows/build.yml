name: CI

on:
  push:
    branches:
      - master
      - ci/*
      - merge/*
  pull_request:
      branches:
        - master

env:
  GAME_REVISION: 0
  GAME_LANGUAGE: ENGLISH
  COMPARE: 0
  UNUSED_ERROR: 1
  DEPRECATED_ERROR: 1

jobs:
  firered:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: ROM (FireRed)
        env:
          GAME_VERSION: FIRERED
        run: make -j$(nproc) -O all

  firered-debug:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: Debug (FireRed)
        env:
          GAME_VERSION: FIRERED
        run: make debug -j$(nproc) -O all

  firered-release:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: Release (FireRed)
        env:
          GAME_VERSION: FIRERED
        run: make -j$(nproc) release

  test:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Environment Setup
        uses: ./.github/actions/environment-setup

      - name: Test
        env:
          GAME_VERSION: FIRERED
          TEST: 1
        run: make -j$(nproc) check

  # Gate job: satisfies the "build" branch protection rule.
  # Passes only when all parallel build/test jobs succeed.
  build:
    if: github.actor != 'allcontributors[bot]'
    runs-on: ubuntu-latest
    needs: [firered, firered-debug, firered-release, test]
    steps:
      - name: All builds passed
        run: echo "All builds and tests passed."
